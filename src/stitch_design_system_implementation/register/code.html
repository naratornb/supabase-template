<body class="bg-surface-alt min-h-screen flex items-center justify-center p-4">
<main class="w-full max-w-[400px] flex flex-col gap-stack-md">
<!-- Brand / Title Area -->
<div class="flex flex-col items-center text-center gap-2 mb-2">
<div class="h-10 w-10 bg-primary rounded-xl flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-on-primary" style="font-variation-settings: 'FILL' 1;">database</span>
</div>
<h1 class="font-h2 text-h2 text-text-primary">Create an account</h1>
<p class="font-body-sm text-body-sm text-text-secondary">Enter your details to get started with Supabase Admin.</p>
</div>
<!-- Auth Card Surface -->
<div class="bg-surface-main border border-border-subtle rounded-xl p-8 flex flex-col gap-stack-md">
<!-- Success State Banner (Included as requested) -->
<div class="bg-secondary-container/20 border border-secondary-container rounded-DEFAULT p-4 flex items-start gap-3">
<span class="material-symbols-outlined text-on-secondary-container mt-0.5" style="font-variation-settings: 'FILL' 1; font-size: 20px;">check_circle</span>
<div class="flex flex-col gap-1">
<p class="font-table-data text-table-data text-on-secondary-container">Account created successfully</p>
<p class="font-body-sm text-body-sm text-on-secondary-container/80">Please check your email to verify your address before logging in.</p>
</div>
</div>
<!-- Registration Form -->
<form class="flex flex-col gap-stack-md" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-text-secondary uppercase" for="email">Email Address</label>
<input class="w-full bg-surface-main border border-border-subtle rounded-DEFAULT px-3 py-2 font-body-base text-body-base text-text-primary focus:outline-none focus:border-outline focus:ring-1 focus:ring-outline transition-colors placeholder:text-text-secondary/50" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-text-secondary uppercase" for="password">Password</label>
<input class="w-full bg-surface-main border border-border-subtle rounded-DEFAULT px-3 py-2 font-body-base text-body-base text-text-primary focus:outline-none focus:border-outline focus:ring-1 focus:ring-outline transition-colors placeholder:text-text-secondary/50" id="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-text-secondary uppercase" for="confirm_password">Confirm Password</label>
<input class="w-full bg-surface-main border border-border-subtle rounded-DEFAULT px-3 py-2 font-body-base text-body-base text-text-primary focus:outline-none focus:border-outline focus:ring-1 focus:ring-outline transition-colors placeholder:text-text-secondary/50" id="confirm_password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary font-table-data text-table-data rounded-DEFAULT py-2.5 mt-2 hover:bg-primary/90 transition-colors flex justify-center items-center gap-2" type="submit">
          Create account
        </button>
</form>
</div>
<!-- Secondary Links -->
<div class="flex justify-center mt-2">
<a class="font-body-sm text-body-sm text-text-secondary hover:text-text-primary transition-colors flex items-center gap-1" href="#">
        Already have an account? <span class="font-medium text-primary">Log in</span>
</a>
</div>
</main>
